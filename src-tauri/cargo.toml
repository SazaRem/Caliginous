[package]
name = "caliginous"
version = "1.0.0"
description = "A privacy-focused desktop browser"
authors = ["You"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Crypto dependencies for Password Manager (Phase 1 - Local)
aes-gcm = "0.10"
argon2 = "0.5"
base64 = "0.21"
rand = "0.8"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
